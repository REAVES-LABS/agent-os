# Phase 1: issues are NOT enabled. This config disables blank issues
# and points reporters at the right channel for security + feedback.

blank_issues_enabled: false

contact_links:
  - name: Security vulnerability
    url: https://github.com/reaves-labs/agent-os/blob/main/SECURITY.md
    about: Email security@reaveslabs.ai. Do NOT open a public issue.

  - name: Feedback / bug reports
    url: mailto:bloom@reaveslabs.ai?subject=agent-os%20feedback
    about: Phase 1 — direct email. Public issues open with v0.2.

  - name: Read the contributing guide
    url: https://github.com/reaves-labs/agent-os/blob/main/CONTRIBUTING.md
    about: Why PRs and issues aren't accepted yet, and what's coming.

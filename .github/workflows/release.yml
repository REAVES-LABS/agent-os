# Signed-release pipeline.
# Triggered on tag push (e.g., v0.1.0-rc.1).
# Publishes to npm with provenance attestation so consumers can verify
# the package was built from THIS exact source commit.

name: Release

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-rc.*'
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Verify package contents
        run: |
          npm pack --dry-run > /tmp/pack.txt
          cat /tmp/pack.txt
          grep -q 'dist/' /tmp/pack.txt
          grep -q 'bin/' /tmp/pack.txt
          grep -q 'README.md' /tmp/pack.txt
          grep -q 'LICENSE' /tmp/pack.txt
      - name: Publish to npm with provenance
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}

# CI — runs on every push + every PR.
# Phase 0 hardening: lint, typecheck, secret-scan, dependency-audit, CodeQL.
# All inputs come from secrets or protected refs; no user-controlled
# github.event.* fields are interpolated into run commands.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 14 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install (frozen lockfile)
        run: npm ci
      - name: TypeScript typecheck
        run: npx tsc --noEmit
      - name: Build
        run: npm run build
      - name: Verify build output exists
        run: test -f dist/server.js && test -f dist/index.js

  npm-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: npm audit (high+)
        run: npm audit --audit-level=high

  secret-scan-gitleaks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  codeql:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript
          paths-ignore: |
            dist
            node_modules
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - name: Build for analysis
        run: npm run build
      - name: Run CodeQL
        uses: github/codeql-action/analyze@v3

  smoke-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run build
      - name: CLI smoke
        run: node bin/agent-os.mjs --help
